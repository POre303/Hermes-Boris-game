appId: com.hermesboris.game
productName: Hermes & Boris
copyright: Copyright (c) 2026 Vues
directories:
  output: release/${version}
  buildResources: build
files:
  - out/**/*
  - package.json
  - "!**/*.map"
  - "!**/*.tsbuildinfo"
asar: true
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-${arch}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
publish: null
